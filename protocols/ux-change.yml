protocol_id: ux-change
name: UX Change
version: 0.1.0
category: frontend
risk_floor: low
summary: Deterministic protocol for visible UX, frontend, and interaction changes.
roles: [planner, implementer, tester, reviewer]
standards:
  - UX changes must describe affected users and workflow states.
  - UX feature requirements must describe both intended behavior and look and feel.
  - Default UX planning must research current best practices for the delivered task and adapt them to the existing design system.
  - Browser-visible changes require render evidence when feasible.
required_inputs:
  - target workflow or screen
  - affected templates/components
  - behavior and look-and-feel requirement description
  - existing design-system conventions
steps:
  - step_id: classify
    action: classify
    instruction: Classify user, screen, states, accessibility, and responsive risk.
  - step_id: inspect
    action: inspect
    instruction: Read existing UI conventions, design-system artifacts, relevant best-practice references for the task, and affected frontend code.
  - step_id: plan
    action: plan
    instruction: Define behavior requirements, look-and-feel requirements, before/after workflow, states, design-system fit, and verification.
  - step_id: modify
    action: modify
    instruction: Apply UI changes consistently with the design system.
  - step_id: verify
    action: verify
    instruction: Verify rendering, responsive layout, and accessibility basics.
  - step_id: handoff
    action: handoff
    instruction: Record screenshots or render evidence and next action.
artifacts:
  - kind: task_classification
  - kind: trace
  - kind: ux_description
  - kind: accessibility_checklist
  - kind: screenshot_or_render_evidence
  - kind: verification_summary
  - kind: handoff
  - kind: requirements_note
    description: Behavior and look-and-feel requirements, including best-practice research and design-system fit.
  - kind: requirements_note
    condition:
      behavior_change: true
  - kind: user_story
    condition:
      behavior_change: true
approval_gates:
  - permission_change
  - safety_policy_change
verification:
  - Run template/component tests when available.
  - Capture screenshot or render evidence for visible changes.
blocked_actions:
  - skip_render_verification
  - bypass_accessibility_review
