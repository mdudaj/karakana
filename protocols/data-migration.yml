protocol_id: data-migration
name: Data Migration
version: 0.1.0
category: migration
risk_floor: high
summary: Deterministic protocol for data, schema, and migration changes.
roles: [planner, implementer, tester, safety_reviewer, reviewer]
standards:
  - Data changes require schema contracts, migration plans, rollback, and approval records.
  - Production-risk database work must not run without explicit approval.
required_inputs:
  - current schema or data contract
  - migration objective
  - rollback expectations
steps:
  - step_id: classify
    action: classify
    instruction: Classify data scope, compatibility, migration direction, and production risk.
  - step_id: inspect
    action: inspect
    instruction: Read models, migrations, schemas, data contracts, and safety rules.
  - step_id: plan
    action: plan
    instruction: Define forward migration, rollback, validation, and approval needs.
  - step_id: modify
    action: modify
    instruction: Apply migration changes with minimal blast radius.
  - step_id: verify
    action: verify
    instruction: Run migration and data validation tests in local/safe environments.
  - step_id: handoff
    action: handoff
    instruction: Record migration status, risks, and next action.
artifacts:
  - kind: task_classification
  - kind: trace
  - kind: schema_contract
  - kind: migration_plan
  - kind: rollback_plan
  - kind: approval_record
  - kind: verification_summary
  - kind: handoff
approval_gates:
  - database_migration
  - destructive_command
  - deployment
verification:
  - Run migration tests locally.
  - Validate schema/data examples.
blocked_actions:
  - destructive_database_command
  - production_migration_without_approval

