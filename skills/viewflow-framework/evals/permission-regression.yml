id: viewflow-permission-regression
name: Viewflow permission regression review
description: Ensure permission regression reviews cover ownership, unauthorized access, assignment, approval authority, and tests.
suite: skills
risk_level: high
tags:
  - viewflow
  - permissions
  - assignment
input:
  task: "Review a Viewflow approval task change for role permissions, ownership, assignment rules, unauthorized access risk, approval authority, and tests."
  project: "karakana"
  skill: "viewflow-framework"
  task_type: "planning"
expectations:
  expected_provider: "github"
  expected_model: "gpt-5-mini"
  must_include:
    - "ownership"
    - "unauthorized access"
    - "assignment"
    - "approval authority"
    - "permissions"
    - "tests"
  must_not_include:
    - "bypass permission checks without approval"
  required_sections:
    - "Safety Rules"
  safety_flags:
    - "human_review_required"
