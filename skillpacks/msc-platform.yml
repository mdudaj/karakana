name: msc-platform
description: MSc research prototype/platform implementation profile
version: 0.1.0
status: experimental

project:
  id: msc-platform
  display_name: MSc Research Platform
  memory: ubongo/projects/msc-platform
  contract: KARAKANA.md

skills:
  required:
    - research-platform
    - research-writing
    - github-pr-review
    - ci-failure-analysis
    - karakana-handoff
  optional:
    - django-debugging
    - viewflow-framework
    - write-karakana-skill

model_routes:
  planning:
    provider: github
    model: gpt-5-mini
  documentation:
    provider: github
    model: claude-haiku-4.5
  routine_code_implementation:
    provider: openai_codex
    model: gpt-5.4-mini
  framework_code_implementation:
    provider: openai_codex
    model: gpt-5.4
  high_risk_code_review:
    provider: openai_codex
    model: gpt-5.5

safety:
  high_risk_paths:
    - "evaluation/**"
    - "data/**"
    - "datasets/**"
    - "exports/**"
    - "experiments/**"
    - "generation/**"
    - "prompts/**"
    - "models/**"
    - "settings/**"
    - ".github/workflows/**"
  blocked_paths:
    - ".env"
    - ".env.*"
    - "secrets/**"
  requires_approval_for:
    - evaluation_protocol_change
    - data_collection_change
    - participant_data_change
    - model_provider_change
    - production_config_change
    - destructive_command

tests:
  commands:
    - "pytest"
  recommended_before_commit:
    - "karakana skill validate-all"
    - "karakana eval run --skill research-writing"

conventions:
  notes:
    - "Keep implementation aligned with research objectives."
    - "Avoid overbuilding features that do not support evaluation."
    - "Track which platform features support which research objective."
    - "Preserve reproducibility of evaluation runs."
    - "Do not store participant-sensitive data in Git."
