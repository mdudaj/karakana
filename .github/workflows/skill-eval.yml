name: Karakana Skill Evaluation

on:
  pull_request:
    paths:
      - "skills/**"
      - "prompts/**"
      - "evals/**"
      - "karakana/**"
      - "KARAKANA.md"
      - "AGENTS.md"

jobs:
  skill-eval:
    runs-on: ubuntu-latest
    env:
      KARAKANA_LIVE_MODE: "false"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Karakana
        run: python -m pip install -e .[dev]
      - name: Validate skills
        run: karakana skill validate-all
      - name: Run Karakana evals
        run: karakana eval run
      - name: Run tests
        run: pytest
