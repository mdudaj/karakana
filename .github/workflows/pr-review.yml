name: Karakana PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-review:
    runs-on: ubuntu-latest
    env:
      KARAKANA_POST_COMMENTS: "false"
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Karakana
        run: python -m pip install -e .[dev]
      - name: Generate PR review artifact
        if: env.KARAKANA_POST_COMMENTS != 'true'
        run: karakana github pr-review --project karakana --skill github-pr-review
      - name: Generate and post PR review comment
        if: env.KARAKANA_POST_COMMENTS == 'true'
        run: karakana github pr-review --project karakana --skill github-pr-review --post-comment
      - uses: actions/upload-artifact@v4
        with:
          name: karakana-pr-review
          path: .karakana/pr-review.md
