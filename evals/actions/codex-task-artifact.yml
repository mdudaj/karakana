id: actions-codex-task-artifact
name: Codex task artifact
description: Ensure Codex task actions are artifacts and do not execute Codex.
suite: actions
risk_level: medium
tags:
  - actions
  - codex
input:
  task: "Check Codex task action handoff behavior."
  task_type: "simple_summary"
expectations:
  expected_provider: "github"
  expected_model: "claude-haiku-4.5"
  must_include:
