id: actions-blocked-response-no-actions
name: Blocked response creates no normal actions
description: Ensure blocked model responses do not produce normal action handoffs.
suite: actions
risk_level: high
tags:
  - actions
  - blocked
input:
  task: "Check that blocked model responses are not published or converted into normal actions."
  task_type: "simple_summary"
expectations:
