id: ingestion-blocked-target-path
name: Ingestion blocks unsafe target paths
description: Ensure ingestion review blocks unsafe target paths.
suite: ingestion
risk_level: high
tags: [ingestion, safety]
input:
  task: "Ingestion review must block candidates targeting .env, secrets, karakana source code, or GitHub workflows."
  project: karakana
